[project]
name = "autolab-skills"
version = "0.1.0"
description = "Reusable agent tools and skill registry."
requires-python = ">=3.12,<3.13"
dependencies = [
  "autolab-core",
  "autolab-evaluation",
  "autolab-optimizers",
  "autolab-simulators",
]

[tool.uv.sources]
autolab-core = { workspace = true }
autolab-evaluation = { workspace = true }
autolab-optimizers = { workspace = true }
autolab-simulators = { workspace = true }

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autolab"]
