[project]
name = "autolab-cli"
version = "0.1.0"
description = "Autolab Typer CLI."
requires-python = ">=3.12,<3.13"
dependencies = [
  "autolab-core",
  "httpx>=0.28.1",
  "pydantic>=2.11.3",
  "rich>=13.9.4",
  "typer>=0.15.2",
]

[tool.uv.sources]
autolab-core = { workspace = true }

[project.scripts]
autolab = "autolab.cli.main:app"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autolab"]
