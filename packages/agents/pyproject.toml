[project]
name = "autolab-agents"
version = "0.1.0"
description = "ADK agent definitions and prompt scaffolds."
requires-python = ">=3.12,<3.13"
dependencies = [
  "autolab-core",
  "autolab-skills",
  "autolab-telemetry",
  "google-adk>=1.0.0",
  "httpx>=0.28.1",
]

[tool.uv.sources]
autolab-core = { workspace = true }
autolab-skills = { workspace = true }
autolab-telemetry = { workspace = true }

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autolab"]
