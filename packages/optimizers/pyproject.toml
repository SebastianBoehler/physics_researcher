[project]
name = "autolab-optimizers"
version = "0.1.0"
description = "Optimization strategies for campaigns."
requires-python = ">=3.12,<3.13"
dependencies = [
  "autolab-core",
  "numpy>=2.2.4",
  "scikit-learn>=1.6.1",
]

[tool.uv.sources]
autolab-core = { workspace = true }

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autolab"]
